<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCG Gallery</title>
    <style>
        /* Basic reset to remove default margins */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            display: flex; /* Creates a side-by-side layout */
            min-height: 100vh;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 250px;
            background-color: #f4f4f4;
            padding: 20px;
            border-right: 1px solid #ddd;
            /* Keeps the sidebar fixed on the left while gallery scrolls */
            position: fixed;
            height: 100vh;
        }

        .sidebar h1 {
            color: #2ecc71; /* Green heading */
            font-size: 24px;
            margin-bottom: 30px;
        }

        .sidebar ul {
            list-style-type: none;
        }

        .sidebar ul li {
            margin-bottom: 15px;
        }

        .sidebar ul li a {
            text-decoration: none;
            color: #333;
            font-size: 18px;
            display: block;
            padding: 5px 0;
        }

        .sidebar ul li a:hover {
            color: #2ecc71; /* Turns green on hover */
        }

        /* Main Content / Gallery Styling */
        .main-content {
            margin-left: 250px; /* Matches the width of the sidebar to prevent overlap */
            padding: 40px;
            flex-grow: 1;
        }

        .main-content h2 {
            margin-bottom: 20px;
            color: #333;
        }

        /* Image Gallery Grid */
        .image-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .gallery-item {
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .gallery-item:hover {
            transform: scale(1.03);
        }

        .gallery-item img {
            width: 100%;
            height: 200px;
            object-fit: cover; /* Ensures images crop nicely without distorting */
            display: block;
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <h1>SCG</h1>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="resume.html">Resume</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <h2>Image Gallery</h2>
        <div class="image-gallery">
            <div class="gallery-item">
                <img src="https://via.placeholder.com/300" alt="Gallery Image 1">
            </div>
            <div class="gallery-item">
                <img src="https://via.placeholder.com/300" alt="Gallery Image 2">
            </div>
            <div class="gallery-item">
                <img src="https://via.placeholder.com/300" alt="Gallery Image 3">
            </div>
            <div class="gallery-item">
                <img src="https://via.placeholder.com/300" alt="Gallery Image 4">
            </div>
            <div class="gallery-item">
                <img src="https://via.placeholder.com/300" alt="Gallery Image 5">
            </div>
            <div class="gallery-item">
                <img src="https://via.placeholder.com/300" alt="Gallery Image 6">
            </div>
        </div>
    </main>

</body>
</html>
