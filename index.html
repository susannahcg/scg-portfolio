<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCG Gallery</title>
    <style>
        /* Basic reset to remove default margins */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            display: flex; /* Creates a side-by-side layout */
            min-height: 100vh;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 250px;
            background-color: #f4f4f4;
            padding: 20px;
            border-right: 1px solid #ddd;
            /* Keeps the sidebar fixed on the left while gallery scrolls */
            position: fixed;
            height: 100vh;
        }

        .sidebar h1 {
            color: #A4BF86; /* Green heading */
            font-size: 24px;
            margin-bottom: 30px;
        }

        .sidebar ul {
            list-style-type: none;
        }

        .sidebar ul li {
            margin-bottom: 15px;
        }

        .sidebar ul li a {
            text-decoration: none;
            color: #696969;
            font-size: 18px;
            display: block;
            padding: 5px 0;
        }

        .sidebar ul li a:hover {
            color: #A4BF86; /* Turns green on hover */
        }

        /* Main Content / Gallery Styling */
        .main-content {
            margin-left: 250px; /* Matches the width of the sidebar to prevent overlap */
            padding: 40px;
            flex-grow: 1;
        }

        .main-content h2 {
            margin-bottom: 20px;
            color: #C2C2C2;
        }

        /* Image Gallery Masonry Layout */
        .image-gallery {
            /* Sets column width and gap; lets browser decide column count dynamically */
            column-width: 250px; 
            column-gap: 10px;
        }

        .gallery-item {
            /* Prevents a single item from splitting across columns */
            break-inside: avoid; 
            margin-bottom: 10px; /* Vertical gap between items */
            overflow: hidden;
            border-radius: 2px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .gallery-item:hover {
            transform: scale(1.03);
        }

        .gallery-item img {
            width: 100%;
            height: auto; /* Maintains natural aspect ratio */
            display: block;
        }
    </style>
</head>
