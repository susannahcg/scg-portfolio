<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCG Portfolio</title>
    <style>
        /* Reset and basic styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: #333;
            display: flex;
            min-height: 100vh;
            background-color: #ffffff;
        }

        /* Sidebar Layout */
        aside {
            width: 250px;
            padding: 40px;
            position: fixed;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            border-right: 1px solid #eee;
        }

        .logo {
            font-size: 2rem;
            font-weight: bold;
            color: #2e7d32; /* Green heading */
            text-decoration: none;
            margin-bottom: 2rem;
            letter-spacing: -1px;
        }

        nav ul {
            list-style: none;
        }

        nav ul li {
            margin-bottom: 1rem;
        }

        nav ul li a {
            text-decoration: none;
            color: #666;
            font-size: 1rem;
            transition: color 0.2s ease;
        }

        nav ul li a:hover, 
        nav ul li a.active {
            color: #2e7d32;
        }

        /* Main Content Area */
        main {
            margin-left: 250px;
            padding: 40px;
            flex-1: 1;
            width: calc(100% - 250px);
        }

        .content-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .project-card {
            background-color: #f9f9f9;
            aspect-ratio: 4 / 3;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #eee;
            color: #999;
            transition: opacity 0.2s ease;
            cursor: pointer;
        }

        .project-card:hover {
            opacity: 0.8;
        }

        /* Responsive Design for Mobile */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            aside {
                position: relative;
                width: 100%;
                height: auto;
                padding: 20px;
                border-right: none;
                border-bottom: 1px solid #eee;
            }

            .logo {
                margin-bottom: 1rem;
            }

            nav ul {
                display: flex;
                gap: 20px;
            }

            nav ul li {
                margin-bottom: 0;
            }

            main {
                margin-left: 0;
                width: 100%;
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <aside>
        <a href="#" class="logo">SCG</a>
        <nav>
            <ul>
                <li><a href="#" class="active">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Resume</a></li>
            </ul>
        </nav>
    </aside>

    <main>
        <div class="content-gallery">
            <div class="project-card">Project Placeholder 1</div>
            <div class="project-card">Project Placeholder 2</div>
            <div class="project-card">Project Placeholder 3</div>
            <div class="project-card">Project Placeholder 4</div>
            <div class="project-card">Project Placeholder 5</div>
            <div class="project-card">Project Placeholder 6</div>
        </div>
    </main>

</body>
</html>
