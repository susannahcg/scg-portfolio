<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCG Portfolio</title>
    <style>
        /* Reset and basic styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: #333;
            display: flex;
            min-height: 100vh;
            background-color: #ffffff;
        }
        
/* Sidebar Layout */
        aside {
            width: 250px;
            padding: 40px;
            position: fixed;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            border-right: 1px solid #eee;
        }

        .logo {
            font-size: 2rem;
            font-weight: bold;
            color: #2e7d32; /* Green heading */
            text-decoration: none;
            margin-bottom: 2rem;
            letter-spacing: -1px;
        }

        nav ul {
            list-style: none;
        }

        nav ul li {
            margin-bottom: 1rem;
        }

        nav ul li a {
            text-decoration: none;
            color: #666;
            font-size: 1rem;
            transition: color 0.2s ease;
        }

        nav ul li a:hover, 
        nav ul li a.active {
            color: #2e7d32;
        }
        
        /* The Gallery Container */
        .gallery-container {
            display: grid;
            /* Auto-fit creates as many columns as will fit, with a minimum width of 250px */
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            /* Adjust the gap between grid items */
            grid-gap: 15px;
            /* Gives the grid a flexible implicit row height */
            grid-auto-rows: 250px;
        }

        /* The Gallery Item (Wrapper) */
        .gallery-item {
            overflow: hidden;
            border-radius: 2px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        .gallery-item:hover {
            transform: scale(1.02);
        }

        /* The Images */
        .gallery-item img {
            width: 100%;
            height: 100%;
            /* 'cover' ensures the image fills the box, cropping gracefully if aspect ratios don't match */
            object-fit: cover;
            /* Centers the crop area */
            object-position: center; 
            display: block;
        }

        /* Optional: Making specific items span multiple rows/columns for a dynamic look */
        /* You can remove these classes if you want a uniform, clean grid */
        .gallery-item.landscape {
            grid-column: span 2;
        }

        .gallery-item.tall {
            grid-row: span 2;
        }

        /* Responsive adjustments for smaller screens */
        @media (max-width: 600px) {
            .gallery-container {
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
                grid-auto-rows: 150px;
            }
            .gallery-item.landscape {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>

    <div class="gallery-container">
        <div class="gallery-item">
            <img src="https://picsum.photos/500/500?random=1" alt="Gallery Image 1">
        </div>

        <div class="gallery-item landscape">
            <img src="https://picsum.photos/800/400?random=2" alt="Gallery Image 2">
        </div>

        <div class="gallery-item tall">
            <img src="https://picsum.photos/400/800?random=3" alt="Gallery Image 3">
        </div>

        <div class="gallery-item">
            <img src="https://picsum.photos/600/600?random=4" alt="Gallery Image 4">
        </div>

        <div class="gallery-item">
            <img src="https://picsum.photos/700/500?random=5" alt="Gallery Image 5">
        </div>

        <div class="gallery-item">
            <img src="https://picsum.photos/500/700?random=6" alt="Gallery Image 6">
        </div>
    </div>

</body>
</html>
